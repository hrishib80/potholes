<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotholeScan | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card" style="width:100%; max-width:400px;">
        <h2 style="text-align:center; margin-bottom:1.5rem;">Welcome Back</h2>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="username" class="form-input" required>
            </div>
            <div class="form-group"><label>Password</label><input type="password" id="password" class="form-input"
                    required></div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:var(--text-secondary);">
            Don't have an account? <a href="register.html" style="color:var(--accent-primary);">Sign up</a>
        </p>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try { await Auth.login(document.getElementById('username').value, document.getElementById('password').value); }
            catch (err) { alert(err.message); }
        };
    </script>
</body>

</html>
